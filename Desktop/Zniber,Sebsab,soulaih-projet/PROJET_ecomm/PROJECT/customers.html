<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="customerList">Liste des clients</title>
    <link rel="stylesheet" href="css/style.css"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="dashboard-layout">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-logo"><h2><i class="fas fa-shopping-cart"></i> E-Commerce</h2></div>
            <nav class="sidebar-menu">
                <a href="dashboard.html" class="menu-item"><i class="fas fa-chart-line"></i><span data-i18n="dashboard">Dashboard</span></a>
                <a href="products.html" class="menu-item"><i class="fas fa-box"></i><span data-i18n="products">Produits</span></a>
                <a href="categories.html" class="menu-item"><i class="fas fa-tags"></i><span data-i18n="categories">Catégories</span></a>
                <a href="customers.html" class="menu-item active"><i class="fas fa-users"></i><span data-i18n="customers">Clients</span></a>
                <a href="orders.html" class="menu-item"><i class="fas fa-shopping-bag"></i><span data-i18n="orders">Commandes</span></a>
                <a href="suppliers.html" class="menu-item"><i class="fas fa-truck"></i><span data-i18n="suppliers">Fournisseurs</span></a>
            </nav>
        </aside>
        <main class="main-content">
            <nav class="navbar">
                <div class="navbar-left"><button class="btn btn-icon btn-secondary" id="toggleSidebar" style="margin-right:15px;display:none;"><i class="fas fa-bars"></i></button><h1 data-i18n="customerList">Clients</h1></div>
                <div class="navbar-right">
                    <button id="toggleDarkMode" class="btn btn-icon btn-secondary" title="Mode sombre"><i id="darkModeIcon" class="fas fa-moon"></i></button><div class="language-selector"><button class="lang-btn active" onclick="changeLanguage('fr')">FR</button><button class="lang-btn" onclick="changeLanguage('ar')">AR</button><button class="lang-btn" onclick="changeLanguage('en')">EN</button></div>
                    <div class="user-info"><div class="user-avatar" id="userAvatar">A</div><span id="userName">Admin</span></div>
                    <button class="btn btn-danger btn-sm" onclick="Auth.logout()"><i class="fas fa-sign-out-alt"></i><span data-i18n="logout">Déconnexion</span></button>
                </div>
            </nav>
            <div class="card">
                <div class="card-header"><h2 class="card-title" data-i18n="customerList">Clients</h2><div class="flex gap-10"><button class="btn btn-secondary" onclick="exportToCSV(filteredData,'customers')"><i class="fas fa-file-csv"></i><span data-i18n="export">Export</span></button><button class="btn btn-primary" onclick="openForm()"><i class="fas fa-plus"></i><span data-i18n="addCustomer">Ajouter</span></button></div></div>
                <div class="filters-container">
                    <div class="search-box"><i class="fas fa-search"></i><input type="text" id="searchInput" class="form-control" placeholder="Rechercher..."></div>
                    <select id="statusFilter" class="form-control" style="min-width:150px;"><option value="">Tous</option><option value="active">Actifs</option><option value="inactive">Inactifs</option></select>
                    <select id="cityFilter" class="form-control" style="min-width:150px;"><option value="">Toutes villes</option></select>
                    <select id="itemsPerPage" class="form-control" style="min-width:120px;"><option value="10">10/page</option><option value="25">25/page</option><option value="50">50/page</option></select>
                </div>
                <div class="table-container"><table><thead><tr><th style="cursor: pointer;" onclick="sortTable('id')">ID <i class="fas fa-sort"></i></th><th style="cursor: pointer;" onclick="sortTable('firstName')"><span data-i18n="firstName">Prénom</span> <i class="fas fa-sort"></i></th><th style="cursor: pointer;" onclick="sortTable('lastName')"><span data-i18n="lastName">Nom</span> <i class="fas fa-sort"></i></th><th data-i18n="email">Email</th><th data-i18n="phone">Tél</th><th style="cursor: pointer;" onclick="sortTable('city')"><span data-i18n="city">Ville</span> <i class="fas fa-sort"></i></th><th data-i18n="status">Statut</th><th data-i18n="actions">Actions</th></tr></thead><tbody id="dataTable"></tbody></table></div>
                <div class="pagination" id="pagination"></div>
            </div>
        </main>
    </div>
    <script src="data/initial-data.js"></script><script src="js/i18n.js"></script><script src="js/auth.js"></script><script src="js/utils.js"></script><script src="js/crud.js"></script>
    <script>
        initializeData();i18n.translatePage();initLanguageSelector();
        const session=Auth.getSession();if(session){document.getElementById('userName').textContent=session.name;document.getElementById('userAvatar').textContent=session.name.charAt(0).toUpperCase();}
        const isAdmin=Auth.isAdmin();if(!isAdmin){const addBtn=document.querySelector('button[onclick="openForm()"]');if(addBtn)addBtn.style.display='none';}
        let allData=Storage.getAll('customers');let filteredData=[...allData];let pagination;let sortColumn=null;let sortDirection='asc';
        const cities=[...new Set(allData.map(c=>c.city))];cities.forEach(city=>{const opt=document.createElement('option');opt.value=city;opt.textContent=city;document.getElementById('cityFilter').appendChild(opt);});
        function sortTable(column){if(sortColumn===column){sortDirection=sortDirection==='asc'?'desc':'asc';}else{sortColumn=column;sortDirection='asc';}
        filteredData.sort((a,b)=>{let aVal=a[column];let bVal=b[column];if(typeof aVal==='string'){aVal=aVal.toLowerCase();bVal=bVal.toLowerCase();}if(sortDirection==='asc'){return aVal>bVal?1:-1;}else{return aVal<bVal?1:-1;}});updateTable();}
        function updateTable(){const items=parseInt(document.getElementById('itemsPerPage').value);pagination=new Pagination(filteredData,items);const tbody=document.getElementById('dataTable');tbody.innerHTML='';if(pagination.currentData.length===0){tbody.innerHTML='<tr><td colspan="8" class="text-center" data-i18n="noData">Aucune donnée</td></tr>';return;}pagination.currentData.forEach(item=>{const adminActions=isAdmin?`<button class="btn btn-sm btn-warning" onclick="editItem(${item.id})" title="${i18n.t('edit')}"><i class="fas fa-edit"></i></button><button class="btn btn-sm btn-danger" onclick="deleteItem(${item.id})" title="${i18n.t('delete')}"><i class="fas fa-trash"></i></button>`:'';tbody.innerHTML+=`<tr><td>${item.id}</td><td>${item.firstName}</td><td>${item.lastName}</td><td>${item.email}</td><td>${item.phone}</td><td>${item.city}</td><td><span class="badge ${item.status==='active'?'badge-success':'badge-secondary'}">${i18n.t(item.status)}</span></td><td><div class="action-buttons"><a href="customer-details.html?id=${item.id}" class="btn btn-sm btn-info" title="${i18n.t('view')}"><i class="fas fa-eye"></i></a>${adminActions}</div></td></tr>`;});pagination.renderPaginationControls('pagination');}function goToPage(page){pagination.setPage(page);updateTable();}function filterData(){const search=document.getElementById('searchInput').value.toLowerCase();const status=document.getElementById('statusFilter').value;const city=document.getElementById('cityFilter').value;filteredData=allData.filter(item=>{const matchSearch=(item.firstName+' '+item.lastName+' '+item.email).toLowerCase().includes(search);const matchStatus=!status||item.status===status;const matchCity=!city||item.city===city;return matchSearch&&matchStatus&&matchCity;});updateTable();}function deleteItem(id){const item=Storage.find('customers',id);showConfirmModal(`${i18n.t('confirmDelete')}<br><strong>${item.firstName} ${item.lastName}</strong>`,()=>{Storage.delete('customers',id);showToast(i18n.t('deleteSuccess'),'success');allData=Storage.getAll('customers');filterData();});}function openForm(id=null){const modal=document.createElement('div');modal.className='modal-overlay';modal.innerHTML=`<div class="modal-content" style="max-width:600px;"><h3>${id?i18n.t('editCustomer'):i18n.t('addCustomer')}</h3><form id="itemForm"><div style="display:grid;grid-template-columns:1fr 1fr;gap:15px;"><div class="form-group"><label data-i18n="firstName">Prénom *</label><input type="text" id="firstName" class="form-control" required></div><div class="form-group"><label data-i18n="lastName">Nom *</label><input type="text" id="lastName" class="form-control" required></div><div class="form-group"><label data-i18n="email">Email *</label><input type="email" id="email" class="form-control" required></div><div class="form-group"><label data-i18n="phone">Téléphone *</label><input type="tel" id="phone" class="form-control" required></div><div class="form-group"><label data-i18n="city">Ville *</label><input type="text" id="city" class="form-control" required></div><div class="form-group"><label data-i18n="status">Statut</label><select id="status" class="form-control"><option value="active">${i18n.t('active')}</option><option value="inactive">${i18n.t('inactive')}</option></select></div></div><div class="form-group"><label data-i18n="address">Adresse *</label><textarea id="address" class="form-control" rows="2" required></textarea></div><div class="modal-actions"><button type="button" class="btn btn-secondary" onclick="this.closest('.modal-overlay').remove()"><span data-i18n="cancel">${i18n.t('cancel')}</span></button><button type="submit" class="btn btn-primary"><span data-i18n="save">${i18n.t('save')}</span></button></div></form></div>`;document.body.appendChild(modal);i18n.translatePage();if(id){const item=Storage.find('customers',id);document.getElementById('firstName').value=item.firstName;document.getElementById('lastName').value=item.lastName;document.getElementById('email').value=item.email;document.getElementById('phone').value=item.phone;document.getElementById('city').value=item.city;document.getElementById('address').value=item.address;document.getElementById('status').value=item.status;}document.getElementById('itemForm').onsubmit=(e)=>{e.preventDefault();const data={firstName:document.getElementById('firstName').value,lastName:document.getElementById('lastName').value,email:document.getElementById('email').value,phone:document.getElementById('phone').value,city:document.getElementById('city').value,address:document.getElementById('address').value,status:document.getElementById('status').value,totalOrders:0,totalSpent:0,createdAt:new Date().toISOString().split('T')[0]};if(id){Storage.update('customers',id,data);showToast(i18n.t('updateSuccess'),'success');}else{Storage.add('customers',data);showToast(i18n.t('saveSuccess'),'success');}allData=Storage.getAll('customers');filterData();modal.remove();};}function editItem(id){openForm(id);}document.getElementById('searchInput').addEventListener('input',debounce(filterData,300));document.getElementById('statusFilter').addEventListener('change',filterData);document.getElementById('cityFilter').addEventListener('change',filterData);document.getElementById('itemsPerPage').addEventListener('change',updateTable);function changeLanguage(lang){i18n.setLanguage(lang);document.querySelectorAll('.lang-btn').forEach(b=>b.classList.remove('active'));event.target.classList.add('active');location.reload();}const sidebar=document.getElementById('sidebar'),toggleBtn=document.getElementById('toggleSidebar');function checkScreenSize(){toggleBtn.style.display=window.innerWidth<=1024?'inline-flex':'none';}toggleBtn.addEventListener('click',()=>sidebar.classList.toggle('active'));window.addEventListener('resize',checkScreenSize);checkScreenSize();updateTable();
    </script>
</body>
</html>
