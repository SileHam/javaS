<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title data-i18n="supplierList">Liste des fournisseurs</title>
    <link rel="stylesheet" href="css/style.css"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="dashboard-layout">
        <aside class="sidebar" id="sidebar"><div class="sidebar-logo"><h2><i class="fas fa-shopping-cart"></i> E-Commerce</h2></div><nav class="sidebar-menu"><a href="dashboard.html" class="menu-item"><i class="fas fa-chart-line"></i><span data-i18n="dashboard">Dashboard</span></a><a href="products.html" class="menu-item"><i class="fas fa-box"></i><span data-i18n="products">Produits</span></a><a href="categories.html" class="menu-item"><i class="fas fa-tags"></i><span data-i18n="categories">Catégories</span></a><a href="customers.html" class="menu-item"><i class="fas fa-users"></i><span data-i18n="customers">Clients</span></a><a href="orders.html" class="menu-item"><i class="fas fa-shopping-bag"></i><span data-i18n="orders">Commandes</span></a><a href="suppliers.html" class="menu-item active"><i class="fas fa-truck"></i><span data-i18n="suppliers">Fournisseurs</span></a></nav></aside>
        <main class="main-content">
            <nav class="navbar"><div class="navbar-left"><button class="btn btn-icon btn-secondary" id="toggleSidebar" style="margin-right:15px;display:none;"><i class="fas fa-bars"></i></button><h1 data-i18n="supplierList">Fournisseurs</h1></div><div class="navbar-right"><button id="toggleDarkMode" class="btn btn-icon btn-secondary" title="Mode sombre"><i id="darkModeIcon" class="fas fa-moon"></i></button><div class="language-selector"><button class="lang-btn active" onclick="changeLanguage('fr')">FR</button><button class="lang-btn" onclick="changeLanguage('ar')">AR</button><button class="lang-btn" onclick="changeLanguage('en')">EN</button></div><div class="user-info"><div class="user-avatar" id="userAvatar">A</div><span id="userName">Admin</span></div><button class="btn btn-danger btn-sm" onclick="Auth.logout()"><i class="fas fa-sign-out-alt"></i><span data-i18n="logout">Déconnexion</span></button></div></nav>
            <div class="card">
                <div class="card-header"><h2 class="card-title" data-i18n="supplierList">Fournisseurs</h2><div class="flex gap-10"><button class="btn btn-secondary" onclick="exportToCSV(filteredData,'suppliers')"><i class="fas fa-file-csv"></i><span data-i18n="export">Export</span></button><button class="btn btn-primary" onclick="openForm()"><i class="fas fa-plus"></i><span data-i18n="addSupplier">Ajouter</span></button></div></div>
                <div class="filters-container"><div class="search-box"><i class="fas fa-search"></i><input type="text" id="searchInput" class="form-control" placeholder="Rechercher..."></div><select id="ratingFilter" class="form-control" style="min-width:150px;"><option value="">Toutes les notes</option><option value="0-2">0-2 étoiles</option><option value="2-4">2-4 étoiles</option><option value="4-5">4-5 étoiles</option></select><select id="itemsPerPage" class="form-control" style="min-width:120px;"><option value="10">10/page</option><option value="25">25/page</option><option value="50">50/page</option></select></div>
                <div class="table-container"><table><thead><tr><th>ID</th><th data-i18n="supplierName">Nom</th><th data-i18n="contact">Contact</th><th data-i18n="email">Email</th><th data-i18n="phone">Tél</th><th data-i18n="rating">Note</th><th data-i18n="actions">Actions</th></tr></thead><tbody id="dataTable"></tbody></table></div>
                <div class="pagination" id="pagination"></div>
            </div>
        </main>
    </div>
    <script src="data/initial-data.js"></script><script src="js/i18n.js"></script><script src="js/auth.js"></script><script src="js/utils.js"></script><script src="js/crud.js"></script>
    <script>
        initializeData();i18n.translatePage();const session=Auth.getSession();if(session){document.getElementById('userName').textContent=session.name;document.getElementById('userAvatar').textContent=session.name.charAt(0).toUpperCase();}
        const isAdmin=Auth.isAdmin();if(!isAdmin){const addBtn=document.querySelector('button[onclick="openForm()"]');if(addBtn)addBtn.style.display='none';}let allData=Storage.getAll('suppliers');let filteredData=[...allData];let pagination;function updateTable(){const items=parseInt(document.getElementById('itemsPerPage').value);pagination=new Pagination(filteredData,items);const tbody=document.getElementById('dataTable');tbody.innerHTML='';if(pagination.currentData.length===0){tbody.innerHTML='<tr><td colspan="7" class="text-center">Aucune donnée</td></tr>';return;}pagination.currentData.forEach(item=>{tbody.innerHTML+=`<tr><td>${item.id}</td><td><strong>${item.name}</strong></td><td>${item.contact}</td><td>${item.email}</td><td>${item.phone}</td><td><span class="badge badge-info">${item.rating||'-'} ★</span></td><td><div class="action-buttons"><a href="supplier-details.html?id=${item.id}" class="btn btn-sm btn-info" title="${i18n.t('view')}"><i class="fas fa-eye"></i></a>${isAdmin?`<button class="btn btn-sm btn-warning" onclick="editItem(${item.id})" title="${i18n.t('edit')}"><i class="fas fa-edit"></i></button><button class="btn btn-sm btn-danger" onclick="deleteItem(${item.id})" title="${i18n.t('delete')}"><i class="fas fa-trash"></i></button>`:''}</div></td></tr>`;});pagination.renderPaginationControls('pagination');}function goToPage(page){pagination.setPage(page);updateTable();}function filterData(){const search=document.getElementById('searchInput').value.toLowerCase();const ratingFilter=document.getElementById('ratingFilter').value;filteredData=allData.filter(item=>{const matchSearch=(item.name+' '+item.contact+' '+item.email).toLowerCase().includes(search);let matchRating=true;if(ratingFilter){const rating=item.rating||0;if(ratingFilter==='0-2')matchRating=rating>=0&&rating<2;else if(ratingFilter==='2-4')matchRating=rating>=2&&rating<4;else if(ratingFilter==='4-5')matchRating=rating>=4&&rating<=5;}return matchSearch&&matchRating;});updateTable();}function deleteItem(id){const item=Storage.find('suppliers',id);showConfirmModal(`${i18n.t('confirmDelete')}<br><strong>${item.name}</strong>`,()=>{Storage.delete('suppliers',id);showToast(i18n.t('deleteSuccess'),'success');allData=Storage.getAll('suppliers');filterData();});}function openForm(id=null){const modal=document.createElement('div');modal.className='modal-overlay';modal.innerHTML=`<div class="modal-content" style="max-width:600px;"><h3>${id?'Modifier':'Ajouter'} fournisseur</h3><form id="itemForm"><div style="display:grid;grid-template-columns:1fr 1fr;gap:15px;"><div class="form-group"><label>Nom *</label><input type="text" id="name" class="form-control" required></div><div class="form-group"><label>Contact *</label><input type="text" id="contact" class="form-control" required></div><div class="form-group"><label>Email *</label><input type="email" id="email" class="form-control" required></div><div class="form-group"><label>Téléphone *</label><input type="tel" id="phone" class="form-control" required></div><div class="form-group"><label>Note (0-5)</label><input type="number" id="rating" class="form-control" min="0" max="5" step="0.1"></div></div><div class="form-group"><label>Adresse *</label><textarea id="address" class="form-control" rows="2" required></textarea></div><div class="modal-actions"><button type="button" class="btn btn-secondary" onclick="this.closest('.modal-overlay').remove()">Annuler</button><button type="submit" class="btn btn-primary">Enregistrer</button></div></form></div>`;document.body.appendChild(modal);if(id){const item=Storage.find('suppliers',id);document.getElementById('name').value=item.name;document.getElementById('contact').value=item.contact;document.getElementById('email').value=item.email;document.getElementById('phone').value=item.phone;document.getElementById('address').value=item.address;document.getElementById('rating').value=item.rating||'';}document.getElementById('itemForm').onsubmit=(e)=>{e.preventDefault();const data={name:document.getElementById('name').value,contact:document.getElementById('contact').value,email:document.getElementById('email').value,phone:document.getElementById('phone').value,address:document.getElementById('address').value,rating:parseFloat(document.getElementById('rating').value)||0,productsCount:0,createdAt:new Date().toISOString().split('T')[0]};if(id){Storage.update('suppliers',id,data);showToast(i18n.t('updateSuccess'),'success');}else{Storage.add('suppliers',data);showToast(i18n.t('saveSuccess'),'success');}allData=Storage.getAll('suppliers');filterData();modal.remove();};}function editItem(id){openForm(id);}document.getElementById('searchInput').addEventListener('input',debounce(filterData,300));document.getElementById('ratingFilter').addEventListener('change',filterData);document.getElementById('itemsPerPage').addEventListener('change',updateTable);function changeLanguage(lang){i18n.setLanguage(lang);document.querySelectorAll('.lang-btn').forEach(b=>b.classList.remove('active'));event.target.classList.add('active');location.reload();}const sidebar=document.getElementById('sidebar'),toggleBtn=document.getElementById('toggleSidebar');function checkScreenSize(){toggleBtn.style.display=window.innerWidth<=1024?'inline-flex':'none';}toggleBtn.addEventListener('click',()=>sidebar.classList.toggle('active'));window.addEventListener('resize',checkScreenSize);checkScreenSize();updateTable();
    </script>
</body>
</html>
