<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="orderDetails">Détails de la commande</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>
    <div class="dashboard-layout">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-logo"><h2><i class="fas fa-shopping-cart"></i> E-Commerce</h2></div>
            <nav class="sidebar-menu">
                <a href="dashboard.html" class="menu-item"><i class="fas fa-chart-line"></i><span data-i18n="dashboard">Tableau de bord</span></a>
                <a href="products.html" class="menu-item"><i class="fas fa-box"></i><span data-i18n="products">Produits</span></a>
                <a href="categories.html" class="menu-item"><i class="fas fa-tags"></i><span data-i18n="categories">Catégories</span></a>
                <a href="customers.html" class="menu-item"><i class="fas fa-users"></i><span data-i18n="customers">Clients</span></a>
                <a href="orders.html" class="menu-item active"><i class="fas fa-shopping-bag"></i><span data-i18n="orders">Commandes</span></a>
                <a href="suppliers.html" class="menu-item"><i class="fas fa-truck"></i><span data-i18n="suppliers">Fournisseurs</span></a>
            </nav>
        </aside>
        <main class="main-content">
            <nav class="navbar">
                <div class="navbar-left">
                    <button class="btn btn-icon btn-secondary" id="toggleSidebar" style="margin-right: 15px; display: none;"><i class="fas fa-bars"></i></button>
                    <h1 data-i18n="orderDetails">Détails de la commande</h1>
                </div>
                <div class="navbar-right">
                    <button id="toggleDarkMode" class="btn btn-icon btn-secondary" title="Mode sombre"><i id="darkModeIcon" class="fas fa-moon"></i></button><div class="language-selector">
                        <button class="lang-btn" onclick="changeLanguage('fr')">FR</button>
                        <button class="lang-btn" onclick="changeLanguage('ar')">AR</button>
                        <button class="lang-btn" onclick="changeLanguage('en')">EN</button>
                    </div>
                    <div class="user-info">
                        <div class="user-avatar" id="userAvatar">A</div>
                        <span id="userName">Admin</span>
                    </div>
                    <button class="btn btn-danger btn-sm" onclick="Auth.logout()"><i class="fas fa-sign-out-alt"></i><span data-i18n="logout">Déconnexion</span></button>
                </div>
            </nav>
            <div class="details-container" id="orderDetails">
                <div class="details-header">
                    <h2 class="card-title">Commande #<span id="orderNumber">-</span></h2>
                    <div class="flex gap-10">
                        <button class="btn btn-secondary" onclick="window.history.back()"><i class="fas fa-arrow-left"></i><span data-i18n="back">Retour</span></button>
                        <button class="btn btn-info" onclick="exportDetailsToPDF()"><i class="fas fa-file-pdf"></i><span data-i18n="exportPDF">Exporter PDF</span></button>
                        <a href="#" id="editBtn" class="btn btn-warning"><i class="fas fa-edit"></i><span data-i18n="edit">Modifier</span></a>
                        <button class="btn btn-danger" id="deleteBtn"><i class="fas fa-trash"></i><span data-i18n="delete">Supprimer</span></button>
                    </div>
                </div>
                <div class="details-grid">
                    <div class="detail-item">
                        <div class="detail-label" data-i18n="customer">Client</div>
                        <div class="detail-value" id="customer">-</div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-label" data-i18n="date">Date</div>
                        <div class="detail-value" id="date">-</div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-label" data-i18n="orderStatus">Statut</div>
                        <div class="detail-value" id="status">-</div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-label" data-i18n="paymentMethod">Méthode de paiement</div>
                        <div class="detail-value" id="paymentMethod">-</div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-label" data-i18n="total">Total</div>
                        <div class="detail-value" id="total" style="font-size: 24px; font-weight: 700; color: var(--primary-color);">-</div>
                    </div>
                </div>
                <div class="card" style="margin-top: 20px;">
                    <h3 style="margin-bottom: 15px;" data-i18n="items">Articles</h3>
                    <div class="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th data-i18n="productName">Produit</th>
                                    <th data-i18n="quantity">Quantité</th>
                                    <th data-i18n="price">Prix unitaire</th>
                                    <th data-i18n="total">Total</th>
                                </tr>
                            </thead>
                            <tbody id="itemsTable"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="data/initial-data.js"></script>
    <script src="js/i18n.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/utils.js"></script>
    <script>
        initializeData();i18n.translatePage();initLanguageSelector();
        const session=Auth.getSession();if(session){document.getElementById('userName').textContent=session.name;document.getElementById('userAvatar').textContent=session.name.charAt(0).toUpperCase();}
        const urlParams=new URLSearchParams(window.location.search);const orderId=urlParams.get('id');
        if(!orderId){window.location.href='orders.html';}
        const order=Storage.find('orders',orderId);
        if(!order){showToast(i18n.t('notFound'),'error');setTimeout(()=>{window.location.href='orders.html';},2000);}else{
            const customers=Storage.getAll('customers');const products=Storage.getAll('products');
            const customer=customers.find(c=>c.id===order.customerId);
            const badges={pending:'badge-warning',processing:'badge-info',shipped:'badge-primary',delivered:'badge-success',cancelled:'badge-danger'};
            document.getElementById('orderNumber').textContent=order.id;
            document.getElementById('customer').textContent=customer?`${customer.firstName} ${customer.lastName}`:'-';
            document.getElementById('date').textContent=formatDate(order.date);
            document.getElementById('status').innerHTML=`<span class="badge ${badges[order.status]}">${i18n.t(order.status)}</span>`;
            document.getElementById('paymentMethod').textContent=i18n.t(order.paymentMethod);
            document.getElementById('total').textContent=formatCurrency(order.total);
            const itemsTable=document.getElementById('itemsTable');
            if(order.items&&order.items.length>0){
                order.items.forEach(item=>{
                    const product=products.find(p=>p.id===item.productId);
                    const row=document.createElement('tr');
                    row.innerHTML=`<td>${product?product.name:'Produit supprimé'}</td><td>${item.quantity}</td><td>${formatCurrency(item.price)}</td><td><strong>${formatCurrency(item.quantity*item.price)}</strong></td>`;
                    itemsTable.appendChild(row);
                });
            }else{
                itemsTable.innerHTML='<tr><td colspan="4" class="text-center">Aucun article</td></tr>';
            }
            document.getElementById('editBtn').href=`orders.html?edit=${orderId}`;
            document.getElementById('deleteBtn').addEventListener('click',()=>{showConfirmModal(`${i18n.t('confirmDelete')}<br><strong>Commande #${order.id}</strong>`,()=>{Storage.delete('orders',orderId);showToast(i18n.t('deleteSuccess'),'success');setTimeout(()=>{window.location.href='orders.html';},1500);});});
        }
        async function exportDetailsToPDF(){const element=document.getElementById('orderDetails');try{const canvas=await html2canvas(element,{scale:2,useCORS:true,logging:false});const imgData=canvas.toDataURL('image/png');const {jsPDF}=window.jspdf;const pdf=new jsPDF('p','mm','a4');const imgWidth=190;const imgHeight=(canvas.height*imgWidth)/canvas.width;pdf.addImage(imgData,'PNG',10,10,imgWidth,imgHeight);pdf.save(`order_${orderId}_${new Date().toISOString().split('T')[0]}.pdf`);showToast(i18n.t('pdfGenerated'),'success');}catch(error){console.error('PDF generation error:',error);showToast(i18n.t('pdfError'),'error');}}
        function changeLanguage(lang){i18n.setLanguage(lang);document.querySelectorAll('.lang-btn').forEach(btn=>btn.classList.remove('active'));event.target.classList.add('active');location.reload();}
        const sidebar=document.getElementById('sidebar'),toggleBtn=document.getElementById('toggleSidebar');
        function checkScreenSize(){toggleBtn.style.display=window.innerWidth<=1024?'inline-flex':'none';}
        toggleBtn.addEventListener('click',()=>sidebar.classList.toggle('active'));window.addEventListener('resize',checkScreenSize);checkScreenSize();
    </script>
</body>
</html>
