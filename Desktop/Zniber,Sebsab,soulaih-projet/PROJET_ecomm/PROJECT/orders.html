<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title data-i18n="orderList">Liste des commandes</title>
    <link rel="stylesheet" href="css/style.css"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="dashboard-layout">
        <aside class="sidebar" id="sidebar"><div class="sidebar-logo"><h2><i class="fas fa-shopping-cart"></i> E-Commerce</h2></div><nav class="sidebar-menu"><a href="dashboard.html" class="menu-item"><i class="fas fa-chart-line"></i><span data-i18n="dashboard">Dashboard</span></a><a href="products.html" class="menu-item"><i class="fas fa-box"></i><span data-i18n="products">Produits</span></a><a href="categories.html" class="menu-item"><i class="fas fa-tags"></i><span data-i18n="categories">Catégories</span></a><a href="customers.html" class="menu-item"><i class="fas fa-users"></i><span data-i18n="customers">Clients</span></a><a href="orders.html" class="menu-item active"><i class="fas fa-shopping-bag"></i><span data-i18n="orders">Commandes</span></a><a href="suppliers.html" class="menu-item"><i class="fas fa-truck"></i><span data-i18n="suppliers">Fournisseurs</span></a></nav></aside>
        <main class="main-content">
            <nav class="navbar"><div class="navbar-left"><button class="btn btn-icon btn-secondary" id="toggleSidebar" style="margin-right:15px;display:none;"><i class="fas fa-bars"></i></button><h1 data-i18n="orderList">Commandes</h1></div><div class="navbar-right"><button id="toggleDarkMode" class="btn btn-icon btn-secondary" title="Mode sombre"><i id="darkModeIcon" class="fas fa-moon"></i></button><div class="language-selector"><button class="lang-btn active" onclick="changeLanguage('fr')">FR</button><button class="lang-btn" onclick="changeLanguage('ar')">AR</button><button class="lang-btn" onclick="changeLanguage('en')">EN</button></div><div class="user-info"><div class="user-avatar" id="userAvatar">A</div><span id="userName">Admin</span></div><button class="btn btn-danger btn-sm" onclick="Auth.logout()"><i class="fas fa-sign-out-alt"></i><span data-i18n="logout">Déconnexion</span></button></div></nav>
            <div class="card">
                <div class="card-header"><h2 class="card-title" data-i18n="orderList">Commandes</h2><div class="flex gap-10"><button class="btn btn-secondary" onclick="exportToCSV(filteredData,'orders')"><i class="fas fa-file-csv"></i><span data-i18n="export">Export</span></button><button class="btn btn-primary" onclick="openForm()"><i class="fas fa-plus"></i><span data-i18n="addOrder">Ajouter</span></button></div></div>
                <div class="filters-container"><div class="search-box"><i class="fas fa-search"></i><input type="text" id="searchInput" class="form-control" placeholder="Rechercher..."></div><select id="statusFilter" class="form-control" style="min-width:150px;"><option value="">Tous statuts</option><option value="pending">En attente</option><option value="processing">En traitement</option><option value="shipped">Expédiée</option><option value="delivered">Livrée</option><option value="cancelled">Annulée</option></select><select id="itemsPerPage" class="form-control" style="min-width:120px;"><option value="10">10/page</option><option value="25">25/page</option><option value="50">50/page</option></select></div>
                <div class="table-container"><table><thead><tr><th style="cursor: pointer;" onclick="sortTable('id')">N° <i class="fas fa-sort"></i></th><th data-i18n="customer">Client</th><th style="cursor: pointer;" onclick="sortTable('date')"><span data-i18n="date">Date</span> <i class="fas fa-sort"></i></th><th style="cursor: pointer;" onclick="sortTable('total')"><span data-i18n="total">Total</span> <i class="fas fa-sort"></i></th><th data-i18n="orderStatus">Statut</th><th data-i18n="paymentMethod">Paiement</th><th data-i18n="actions">Actions</th></tr></thead><tbody id="dataTable"></tbody></table></div>
                <div class="pagination" id="pagination"></div>
            </div>
        </main>
    </div>
    <script src="data/initial-data.js"></script><script src="js/i18n.js"></script><script src="js/auth.js"></script><script src="js/utils.js"></script><script src="js/crud.js"></script>
    <script>
        initializeData();i18n.translatePage();const session=Auth.getSession();if(session){document.getElementById('userName').textContent=session.name;document.getElementById('userAvatar').textContent=session.name.charAt(0).toUpperCase();}
        const isAdmin=Auth.isAdmin();if(!isAdmin){const addBtn=document.querySelector('button[onclick="openForm()"]');if(addBtn)addBtn.style.display='none';}let allData=Storage.getAll('orders');const customers=Storage.getAll('customers');let filteredData=[...allData];let pagination;function getCustomerName(id){const c=customers.find(x=>x.id===id);return c?`${c.firstName} ${c.lastName}`:'-';}function updateTable(){const items=parseInt(document.getElementById('itemsPerPage').value);pagination=new Pagination(filteredData,items);const tbody=document.getElementById('dataTable');tbody.innerHTML='';if(pagination.currentData.length===0){tbody.innerHTML='<tr><td colspan="7" class="text-center">Aucune donnée</td></tr>';return;}pagination.currentData.forEach(item=>{const badges={pending:'badge-warning',processing:'badge-info',shipped:'badge-primary',delivered:'badge-success',cancelled:'badge-danger'};tbody.innerHTML+=`<tr><td>#${item.id}</td><td>${getCustomerName(item.customerId)}</td><td>${formatShortDate(item.date)}</td><td><strong>${formatCurrency(item.total)}</strong></td><td><span class="badge ${badges[item.status]}">${i18n.t(item.status)}</span></td><td>${i18n.t(item.paymentMethod)}</td><td><div class="action-buttons"><a href="order-details.html?id=${item.id}" class="btn btn-sm btn-info" title="${i18n.t('view')}"><i class="fas fa-eye"></i></a>${isAdmin?`<button class="btn btn-sm btn-warning" onclick="editItem(${item.id})" title="${i18n.t('edit')}"><i class="fas fa-edit"></i></button><button class="btn btn-sm btn-danger" onclick="deleteItem(${item.id})" title="${i18n.t('delete')}"><i class="fas fa-trash"></i></button>`:''}</div></td></tr>`;});pagination.renderPaginationControls('pagination');}function goToPage(page){pagination.setPage(page);updateTable();}function filterData(){const search=document.getElementById('searchInput').value.toLowerCase();const status=document.getElementById('statusFilter').value;filteredData=allData.filter(item=>{const matchSearch=getCustomerName(item.customerId).toLowerCase().includes(search)||item.id.toString().includes(search);const matchStatus=!status||item.status===status;return matchSearch&&matchStatus;});updateTable();}function deleteItem(id){const item=Storage.find('orders',id);showConfirmModal(`${i18n.t('confirmDelete')}<br><strong>${i18n.t('orderNumber')} #${id}</strong>`,()=>{Storage.delete('orders',id);showToast(i18n.t('deleteSuccess'),'success');allData=Storage.getAll('orders');filterData();});}function openForm(id=null){const modal=document.createElement('div');modal.className='modal-overlay';modal.innerHTML=`<div class="modal-content" style="max-width:500px;"><h3>${id?'Modifier':'Ajouter'} commande</h3><form id="itemForm"><div class="form-group"><label>Client *</label><select id="customerId" class="form-control" required>${customers.map(c=>`<option value="${c.id}">${c.firstName} ${c.lastName}</option>`).join('')}</select></div><div class="form-group"><label>Date *</label><input type="date" id="date" class="form-control" required></div><div class="form-group"><label>Total (DH) *</label><input type="number" id="total" class="form-control" step="0.01" min="0" required></div><div class="form-group"><label>Statut *</label><select id="status" class="form-control"><option value="pending">En attente</option><option value="processing">En traitement</option><option value="shipped">Expédiée</option><option value="delivered">Livrée</option><option value="cancelled">Annulée</option></select></div><div class="form-group"><label>Paiement *</label><select id="paymentMethod" class="form-control"><option value="cash">Espèces</option><option value="card">Carte</option><option value="transfer">Virement</option></select></div><div class="modal-actions"><button type="button" class="btn btn-secondary" onclick="this.closest('.modal-overlay').remove()">Annuler</button><button type="submit" class="btn btn-primary">Enregistrer</button></div></form></div>`;document.body.appendChild(modal);if(id){const item=Storage.find('orders',id);document.getElementById('customerId').value=item.customerId;document.getElementById('date').value=item.date;document.getElementById('total').value=item.total;document.getElementById('status').value=item.status;document.getElementById('paymentMethod').value=item.paymentMethod;}else{document.getElementById('date').value=new Date().toISOString().split('T')[0];}document.getElementById('itemForm').onsubmit=(e)=>{e.preventDefault();const data={customerId:parseInt(document.getElementById('customerId').value),date:document.getElementById('date').value,total:parseFloat(document.getElementById('total').value),status:document.getElementById('status').value,paymentMethod:document.getElementById('paymentMethod').value,items:[]};if(id){Storage.update('orders',id,data);showToast(i18n.t('updateSuccess'),'success');}else{Storage.add('orders',data);showToast(i18n.t('saveSuccess'),'success');}allData=Storage.getAll('orders');filterData();modal.remove();};}function editItem(id){openForm(id);}document.getElementById('searchInput').addEventListener('input',debounce(filterData,300));document.getElementById('statusFilter').addEventListener('change',filterData);document.getElementById('itemsPerPage').addEventListener('change',updateTable);function changeLanguage(lang){i18n.setLanguage(lang);document.querySelectorAll('.lang-btn').forEach(b=>b.classList.remove('active'));event.target.classList.add('active');location.reload();}const sidebar=document.getElementById('sidebar'),toggleBtn=document.getElementById('toggleSidebar');function checkScreenSize(){toggleBtn.style.display=window.innerWidth<=1024?'inline-flex':'none';}toggleBtn.addEventListener('click',()=>sidebar.classList.toggle('active'));window.addEventListener('resize',checkScreenSize);checkScreenSize();updateTable();
    </script>
</body>
</html>
