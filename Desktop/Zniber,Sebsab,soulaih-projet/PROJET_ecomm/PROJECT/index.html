<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - E-Commerce Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h1><i class="fas fa-shopping-cart"></i> E-Commerce</h1>
                <p data-i18n="login">Connexion</p>
            </div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="email" data-i18n="email">Email</label>
                    <input type="email" id="email" class="form-control" data-i18n="email" placeholder="Email" required>
                </div>
                
                <div class="form-group">
                    <label for="password" data-i18n="password">Mot de passe</label>
                    <input type="password" id="password" class="form-control" data-i18n="password" placeholder="Mot de passe" required>
                </div>
                
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-sign-in-alt"></i>
                    <span data-i18n="loginButton">Se connecter</span>
                </button>
            </form>
            
            <div style="margin-top: 20px; padding: 15px; background: #EEF2FF; border-radius: 8px; font-size: 13px;">
                <p style="font-weight: 600; margin-bottom: 8px;">Comptes de test :</p>
                <p>Admin: admin@app.com / admin123</p>
                <p>User: user@app.com / user123</p>
            </div>
            
            <div class="language-selector" style="margin-top: 20px; justify-content: center;"><button id="toggleDarkMode" class="btn btn-icon btn-secondary" style="margin-right:10px" title="Mode sombre"><i id="darkModeIcon" class="fas fa-moon"></i></button>
                <button type="button" class="lang-btn active" onclick="changeLanguage('fr')">FR</button>
                <button type="button" class="lang-btn" onclick="changeLanguage('ar')">AR</button>
                <button type="button" class="lang-btn" onclick="changeLanguage('en')">EN</button>
            </div>
        </div>
    </div>
    
    <script src="data/initial-data.js"></script>
    <script src="js/i18n.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/utils.js"></script>
    <script>
        // Initialize data
        initializeData();
        
        // Translate page on load
        i18n.translatePage();
        
        // Change language
        function changeLanguage(lang) {
            i18n.setLanguage(lang);
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
        }
        
        // Handle login
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            // Validation
            Validator.clearAllErrors();
            let isValid = true;
            
            if (!Validator.isRequired(email)) {
                Validator.showError('email', i18n.t('requiredField'));
                isValid = false;
            } else if (!Validator.isEmail(email)) {
                Validator.showError('email', i18n.t('invalidEmail'));
                isValid = false;
            }
            
            if (!Validator.isRequired(password)) {
                Validator.showError('password', i18n.t('requiredField'));
                isValid = false;
            }
            
            if (!isValid) return;
            
            // Attempt login
            const result = Auth.login(email, password);
            
            if (result.success) {
                showToast(i18n.t('loginButton'), 'success');
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1000);
            } else {
                showToast(i18n.t('invalidCredentials'), 'error');
            }
        });
        
        // Clear error on input
        document.querySelectorAll('.form-control').forEach(input => {
            input.addEventListener('input', () => {
                Validator.clearError(input.id);
            });
        });
    </script>
</body>
</html>
